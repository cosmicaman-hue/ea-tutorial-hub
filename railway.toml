[build]
builder = "nixpacks"
buildCommand = "pip install --no-cache-dir -r requirements.txt"

[deploy]
startCommand = "gunicorn --workers=1 --threads=1 --worker-tmp-dir=/dev/shm --timeout=120 --graceful-timeout=30 --max-requests=180 --max-requests-jitter=30 --bind=0.0.0.0:$PORT wsgi:app"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[environments.production.deploy]
numReplicas = 1
