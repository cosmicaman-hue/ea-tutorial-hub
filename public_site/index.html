<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>EA Public Scoreboard</title>
    <style>
        :root {
            --bg: #0b1020;
            --card: #111827;
            --line: rgba(148,163,184,.2);
            --text: #e5e7eb;
            --muted: #94a3b8;
            --good: #22c55e;
            --bad: #f87171;
            --chip: #172036;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top, #111b34 0%, var(--bg) 42%);
            color: var(--text);
        }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 16px; }
        .header {
            text-align: center;
            padding: 18px 12px;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            border-bottom: 1px solid var(--line);
        }
        .header h1 { margin: 0; letter-spacing: 2px; font-size: clamp(20px, 3vw, 34px); }
        .header p { margin: 8px 0 0; color: var(--muted); font-size: 13px; }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
            margin: 14px 0;
        }
        select, button {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 14px;
        }
        button { cursor: pointer; }
        .tab-btn.active { border-color: #38bdf8; box-shadow: 0 0 0 1px rgba(56,189,248,.2) inset; }
        .meta { margin-left: auto; color: var(--muted); font-size: 12px; }
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
            overflow: hidden;
        }
        .panel.hidden { display: none; }
        .scroll { overflow-x: auto; }
        table { width: 100%; min-width: 580px; border-collapse: collapse; }
        th, td { padding: 10px 12px; border-bottom: 1px solid var(--line); }
        th { text-align: left; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }
        td:last-child, th:last-child { text-align: right; }
        .rank { width: 72px; text-align: center; }
        .pos { color: var(--good); font-weight: 700; }
        .neg { color: var(--bad); font-weight: 700; }
        .empty { text-align: center; color: var(--muted); padding: 30px; }
        .info-wrap { padding: 12px; display: grid; gap: 12px; }
        .info-item {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 12px;
            background: rgba(15,23,42,.55);
        }
        .info-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .chip {
            background: var(--chip);
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            font-size: 11px;
            padding: 3px 8px;
        }
        .info-boxes {
            display: grid;
            gap: 8px;
            margin-top: 8px;
        }
        .info-box {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            background: rgba(2,6,23,.35);
        }
        .info-attachment {
            margin-top: 10px;
        }
        .info-attachment img {
            max-width: 100%;
            height: auto;
            border: 1px solid var(--line);
            border-radius: 8px;
        }
        .info-attachment a {
            color: #7dd3fc;
            text-decoration: none;
            border-bottom: 1px dashed rgba(125,211,252,.5);
        }
        .info-table th, .info-table td {
            font-size: 13px;
            text-align: left;
        }
        @media (max-width: 640px) {
            .meta { margin-left: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>EXCEL ACADEMY SCOREBOARD</h1>
        <p>Public view (read-only)</p>
    </div>
    <div class="wrap">
        <div class="controls">
            <button id="tabScoreboard" class="tab-btn active" type="button">Scoreboard</button>
            <button id="tabInfo" class="tab-btn" type="button">Public Information</button>
            <label for="monthSel">Month</label>
            <select id="monthSel"></select>
            <button id="refreshBtn" type="button">Refresh</button>
            <span id="syncMeta" class="meta">Syncing...</span>
        </div>
        <div id="scoreboardPanel" class="panel card">
            <div class="scroll">
                <table>
                    <thead>
                        <tr>
                            <th class="rank">Rank</th>
                            <th>Roll</th>
                            <th>Name</th>
                            <th>Class</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="body">
                        <tr><td class="empty" colspan="5">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div id="infoPanel" class="panel card hidden">
            <div id="publicInfoList" class="info-wrap">
                <div class="empty">Loading information...</div>
            </div>
        </div>
    </div>

    <script>
        const monthSel = document.getElementById('monthSel');
        const refreshBtn = document.getElementById('refreshBtn');
        const syncMeta = document.getElementById('syncMeta');
        const body = document.getElementById('body');
        const infoList = document.getElementById('publicInfoList');
        const tabScoreboard = document.getElementById('tabScoreboard');
        const tabInfo = document.getElementById('tabInfo');
        const scoreboardPanel = document.getElementById('scoreboardPanel');
        const infoPanel = document.getElementById('infoPanel');
        let latest = { months: [], scoreboard: {}, top_full_count: 15, public_information: [] };

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function cleanName(value) {
            return String(value || '').replace(/\s*\([^)]*\)/g, '').replace(/\s+/g, ' ').trim() || '-';
        }

        function parseStamp(v) {
            const n = Date.parse(String(v || ''));
            return Number.isFinite(n) ? n : 0;
        }

        function rollKey(v) { return String(v || '').trim().toUpperCase(); }
        function normStatus(v) {
            const s = String(v || '').toLowerCase();
            return ['present', 'absent', 'late', 'leave'].includes(s) ? s : 'present';
        }
        function penaltyOf(status) {
            if (status === 'absent') return -20;
            if (status === 'late') return -5;
            return 0;
        }
        function monthKeys(data) {
            const set = new Set();
            (data.months || []).forEach(m => set.add(String(m || '').trim()));
            (data.scores || []).forEach(s => set.add(String(s && s.month || '').trim()));
            (data.attendance || []).forEach(a => {
                const d = String(a && a.date || '').trim();
                if (d.length >= 7) set.add(d.slice(0, 7));
            });
            const all = Array.from(set).filter(v => /^\d{4}-\d{2}$/.test(v)).sort((a, b) => b.localeCompare(a));
            const now = new Date();
            const keep = new Set();
            const y = now.getFullYear();
            const m = now.getMonth() + 1;
            for (let i = 0; i < 3; i++) {
                const dt = new Date(y, m - 1 - i, 1);
                keep.add(`${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}`);
            }
            return all.filter(month => keep.has(month)).slice(0, 3);
        }
        function getMonthRosterRolls(data, month) {
            const rolls = new Set();
            const ms = data && data.month_students && data.month_students[month];
            const mp = data && data.month_roster_profiles && data.month_roster_profiles[month];
            (Array.isArray(ms) ? ms : []).forEach(v => { const r = rollKey(v); if (r) rolls.add(r); });
            (Array.isArray(mp) ? mp : []).forEach(p => { const r = rollKey(p && p.roll); if (r) rolls.add(r); });
            return rolls;
        }
        function legacyRowsForMonth(data, month) {
            const rosterRolls = getMonthRosterRolls(data, month);
            const baseStudents = (data.students || []).filter(s => s && s.active !== false);
            const visible = rosterRolls.size
                ? baseStudents.filter(s => rosterRolls.has(rollKey(s && s.roll)))
                : baseStudents;

            const dedupByRoll = new Map();
            visible.forEach(s => {
                const r = rollKey(s && s.roll);
                if (r && !dedupByRoll.has(r)) dedupByRoll.set(r, s);
            });

            const students = Array.from(dedupByRoll.values());
            const byId = new Map(students.map(s => [parseInt(s.id, 10), s]));
            const totals = new Map(students.map(s => [parseInt(s.id, 10), 0]));

            (data.scores || []).forEach(sc => {
                const sid = parseInt(sc && sc.studentId, 10);
                if (!sid || !totals.has(sid)) return;
                if (String(sc && sc.month || '').trim() !== month) return;
                const pts = parseInt(sc && sc.points, 10) || 0;
                totals.set(sid, (totals.get(sid) || 0) + pts);
            });

            const attLatest = new Map();
            (data.attendance || []).forEach(a => {
                const sid = parseInt(a && a.studentId, 10);
                const d = String(a && a.date || '').trim();
                if (!sid || !d.startsWith(month)) return;
                const key = `${sid}|${d}`;
                const prev = attLatest.get(key);
                const pts = parseStamp(prev && (prev.updated_at || prev.created_at));
                const nts = parseStamp((a && (a.updated_at || a.created_at)) || '');
                if (!prev || nts >= pts) attLatest.set(key, a);
            });

            attLatest.forEach(a => {
                const sid = parseInt(a && a.studentId, 10);
                if (sid && totals.has(sid)) {
                    totals.set(sid, (totals.get(sid) || 0) + penaltyOf(normStatus(a && a.status)));
                }
            });

            return Array.from(totals.entries()).map(([sid, total]) => {
                const s = byId.get(sid) || {};
                return {
                    rank: 0,
                    roll: rollKey(s.roll || ''),
                    name: cleanName(s.base_name || s.name || ''),
                    class: s.class || '-',
                    total: total || 0,
                    masked: false
                };
            }).sort((a, b) => b.total !== a.total ? b.total - a.total : a.roll.localeCompare(b.roll)).map((row, i) => ({
                ...row,
                rank: i + 1,
                masked: i + 1 > 15,
                name: i + 1 > 15 ? '' : row.name,
                class: i + 1 > 15 ? '' : row.class
            }));
        }

        function normalizePayload(payload) {
            if (payload && payload.scoreboard && !payload.data) {
                return {
                    updated_at: payload.updated_at || '',
                    top_full_count: Number(payload.top_full_count) || 15,
                    months: Array.isArray(payload.months) ? payload.months : [],
                    scoreboard: payload.scoreboard || {},
                    public_information: Array.isArray(payload.public_information) ? payload.public_information : []
                };
            }

            const raw = payload && payload.data ? payload.data : {};
            const months = monthKeys(raw);
            const scoreboard = {};
            months.forEach(month => {
                scoreboard[month] = legacyRowsForMonth(raw, month);
            });
            return {
                updated_at: payload && payload.updated_at ? payload.updated_at : '',
                top_full_count: 15,
                months,
                scoreboard,
                public_information: []
            };
        }

        function renderScoreboard(snapshot) {
            latest = snapshot || { months: [], scoreboard: {}, top_full_count: 15, public_information: [] };
            const months = Array.isArray(latest.months) ? latest.months : [];
            const preferred = localStorage.getItem('ea_pub_month') || '';
            monthSel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
            const selected = months.includes(preferred) ? preferred : (months[0] || '');
            monthSel.value = selected;

            if (!selected) {
                body.innerHTML = '<tr><td class="empty" colspan="5">No month data available</td></tr>';
                return;
            }

            const rows = Array.isArray((latest.scoreboard || {})[selected]) ? latest.scoreboard[selected] : [];
            if (!rows.length) {
                body.innerHTML = '<tr><td class="empty" colspan="5">No data for this month</td></tr>';
                return;
            }

            body.innerHTML = rows.map((r, i) => {
                const rank = Number(r.rank) || (i + 1);
                const cls = Number(r.total) > 0 ? 'pos' : (Number(r.total) < 0 ? 'neg' : '');
                const name = r.masked ? '&mdash;' : esc(cleanName(r.name || '-'));
                const classVal = r.masked ? '&mdash;' : esc(r.class || '-');
                return `<tr>
                    <td class="rank">${rank}</td>
                    <td>${esc(r.roll || '-')}</td>
                    <td>${name}</td>
                    <td>${classVal}</td>
                    <td class="${cls}">${Number(r.total) || 0}</td>
                </tr>`;
            }).join('');
        }

        function renderPublicInformation(snapshot) {
            const items = Array.isArray(snapshot && snapshot.public_information) ? snapshot.public_information : [];
            if (!items.length) {
                infoList.innerHTML = '<div class="empty">No public information posted yet.</div>';
                return;
            }
            infoList.innerHTML = items.map(item => {
                const title = esc(item.title || 'Information');
                const layout = esc(String(item.layout || 'cards').toUpperCase());
                const lines = String(item.content || '').split(/\r?\n/).map(v => v.trim()).filter(Boolean);
                let bodyHtml = '';
                if (String(item.layout || '') === 'table') {
                    const cols = Array.isArray(item.table_columns) ? item.table_columns : [];
                    const rows = Array.isArray(item.table_rows) ? item.table_rows : [];
                    const th = cols.map(c => `<th>${esc(c)}</th>`).join('');
                    const tr = rows.map(row => `<tr>${(Array.isArray(row) ? row : []).map(cell => `<td>${esc(cell)}</td>`).join('')}</tr>`).join('');
                    bodyHtml = `
                        <div class="scroll">
                            <table class="info-table">
                                <thead><tr>${th}</tr></thead>
                                <tbody>${tr || '<tr><td class="empty">No table rows</td></tr>'}</tbody>
                            </table>
                        </div>
                    `;
                } else {
                    bodyHtml = `<div class="info-boxes">${lines.length ? lines.map(line => `<div class="info-box">${esc(line)}</div>`).join('') : '<div class="info-box">No details</div>'}</div>`;
                }

                let attachmentHtml = '';
                const attachment = item.attachment || null;
                if (attachment && attachment.data_url) {
                    const mime = String(attachment.mime || '').toLowerCase();
                    const name = esc(attachment.name || 'attachment');
                    if (mime.startsWith('image/')) {
                        attachmentHtml = `<div class="info-attachment"><img src="${attachment.data_url}" alt="${name}"></div>`;
                    } else if (mime === 'application/pdf') {
                        attachmentHtml = `<div class="info-attachment"><a href="${attachment.data_url}" target="_blank" rel="noopener noreferrer">Open PDF: ${name}</a></div>`;
                    }
                }

                const updated = esc(item.updated_at || '');
                return `
                    <article class="info-item">
                        <div class="info-head">
                            <h3 style="margin:0;font-size:16px;">${title}</h3>
                            <span class="chip">${layout}</span>
                        </div>
                        ${bodyHtml}
                        ${attachmentHtml}
                        ${updated ? `<div class="meta" style="margin-top:8px;">Updated: ${updated}</div>` : ''}
                    </article>
                `;
            }).join('');
        }

        function setActiveTab(tabKey) {
            const scoreboard = tabKey === 'scoreboard';
            tabScoreboard.classList.toggle('active', scoreboard);
            tabInfo.classList.toggle('active', !scoreboard);
            scoreboardPanel.classList.toggle('hidden', !scoreboard);
            infoPanel.classList.toggle('hidden', scoreboard);
            monthSel.disabled = !scoreboard;
        }

        async function fetchAndRender() {
            try {
                const resp = await fetch(`./scores.json?_=${Date.now()}`, { cache: 'no-store' });
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const payload = await resp.json();
                const snap = normalizePayload(payload);
                renderScoreboard(snap);
                renderPublicInformation(snap);
                const stamp = payload && payload.updated_at ? payload.updated_at : '';
                syncMeta.textContent = stamp ? `Last updated: ${new Date(stamp).toLocaleString()}` : 'Updated';
            } catch (err) {
                syncMeta.textContent = 'Unable to load latest scores';
                body.innerHTML = '<tr><td class="empty" colspan="5">Failed to load scores.json</td></tr>';
                infoList.innerHTML = '<div class="empty">Failed to load public information.</div>';
            }
        }

        monthSel.addEventListener('change', () => {
            localStorage.setItem('ea_pub_month', monthSel.value);
            renderScoreboard(latest || {});
        });
        refreshBtn.addEventListener('click', fetchAndRender);
        tabScoreboard.addEventListener('click', () => setActiveTab('scoreboard'));
        tabInfo.addEventListener('click', () => setActiveTab('info'));

        setActiveTab('scoreboard');
        fetchAndRender();
        setInterval(fetchAndRender, 30000);
    </script>
</body>
</html>
